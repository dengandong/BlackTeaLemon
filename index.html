<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BlackTeaLemon · Poker Career Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js"></script>
<style>
  :root {
    --bg-deep: #0a0d12;
    --bg-panel: #11151c;
    --bg-elevated: #161b24;
    --bg-input: #0d1117;
    --border-subtle: #1f2630;
    --border-strong: #2a3340;
    --text-primary: #e6edf3;
    --text-secondary: #8b95a3;
    --text-muted: #5a6473;
    --accent-green: #3fb950;
    --accent-green-glow: rgba(63, 185, 80, 0.15);
    --accent-red: #f85149;
    --accent-red-glow: rgba(248, 81, 73, 0.15);
    --accent-gold: #d4a857;
    --accent-cyan: #58a6ff;
    --grid-line: rgba(139, 149, 163, 0.06);
    --shadow-elevated: 0 8px 32px rgba(0, 0, 0, 0.6), 0 2px 6px rgba(0, 0, 0, 0.4);
    --shadow-inset: inset 0 1px 0 rgba(255, 255, 255, 0.03);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: 'Inter', -apple-system, sans-serif;
    font-feature-settings: 'tnum' 1, 'cv11' 1;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(212, 168, 87, 0.08), transparent),
      radial-gradient(ellipse 60% 40% at 100% 100%, rgba(63, 185, 80, 0.04), transparent),
      radial-gradient(ellipse 60% 40% at 0% 100%, rgba(248, 81, 73, 0.03), transparent);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  #root {
    position: relative;
    z-index: 1;
  }

  /* ==== Mono numeric utility ==== */
  .mono { font-family: 'JetBrains Mono', monospace; font-feature-settings: 'tnum' 1; }
  .serif { font-family: 'Cormorant Garamond', serif; }

  /* ==== Header ==== */
  .header {
    border-bottom: 1px solid var(--border-subtle);
    background: linear-gradient(180deg, rgba(17, 21, 28, 0.95), rgba(10, 13, 18, 0.7));
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .header-inner {
    max-width: 1600px;
    margin: 0 auto;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }

  .brand-mark {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 28px;
    letter-spacing: 0.02em;
    background: linear-gradient(180deg, #f4e4b8, #d4a857);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .brand-divider {
    width: 1px;
    height: 18px;
    background: var(--border-strong);
  }

  .brand-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .header-status {
    display: flex;
    align-items: center;
    gap: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-secondary);
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-subtle);
    border-radius: 4px;
  }

  /* ==== Auth button in header ==== */
  .auth-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .auth-btn.locked {
    background: var(--bg-elevated);
    border: 1px solid var(--border-subtle);
    color: var(--text-secondary);
  }
  .auth-btn.locked:hover {
    border-color: var(--accent-gold);
    color: var(--accent-gold);
  }

  .auth-btn.unlocked {
    background: linear-gradient(180deg, rgba(212, 168, 87, 0.15), rgba(212, 168, 87, 0.05));
    border: 1px solid var(--accent-gold);
    color: var(--accent-gold);
    box-shadow: 0 0 12px rgba(212, 168, 87, 0.15);
  }
  .auth-btn.unlocked:hover {
    background: linear-gradient(180deg, rgba(212, 168, 87, 0.22), rgba(212, 168, 87, 0.08));
  }

  /* ==== Unlock Modal ==== */
  .modal.unlock-modal { max-width: 420px; }

  .unlock-icon-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 10px;
    color: var(--accent-gold);
    opacity: 0.85;
  }

  .unlock-tagline {
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 16px;
    color: var(--text-secondary);
    margin-bottom: 22px;
  }

  .unlock-error {
    margin-top: 8px;
    color: var(--accent-red);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
  }

  .unlock-helper {
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid var(--border-subtle);
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.7;
  }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent-green);
    box-shadow: 0 0 8px var(--accent-green);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* ==== Main layout ==== */
  .main {
    max-width: 1600px;
    margin: 0 auto;
    padding: 28px 32px 80px;
  }

  /* ==== Stats strip ==== */
  .stats-strip {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 1px;
    background: var(--border-subtle);
    border: 1px solid var(--border-subtle);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .stat-cell {
    background: var(--bg-panel);
    padding: 18px 22px;
    position: relative;
  }

  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--text-primary);
  }

  .stat-value.positive { color: var(--accent-green); }
  .stat-value.negative { color: var(--accent-red); }

  .stat-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ==== Chart panel ==== */
  .chart-panel {
    background: var(--bg-panel);
    border: 1px solid var(--border-subtle);
    border-radius: 6px;
    padding: 20px 24px 12px;
    margin-bottom: 24px;
    box-shadow: var(--shadow-elevated), var(--shadow-inset);
  }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border-subtle);
  }

  .panel-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 20px;
    letter-spacing: 0.01em;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .panel-title-prefix {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--accent-gold);
    text-transform: uppercase;
  }

  .chart-controls {
    display: flex;
    gap: 4px;
    background: var(--bg-input);
    border: 1px solid var(--border-subtle);
    border-radius: 4px;
    padding: 3px;
  }

  .chart-control-btn {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    padding: 6px 12px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s ease;
  }

  .chart-control-btn:hover { color: var(--text-primary); }

  .chart-control-btn.active {
    background: var(--bg-elevated);
    color: var(--accent-gold);
    box-shadow: var(--shadow-inset);
  }

  .chart-wrapper {
    height: 480px;
    position: relative;
  }

  .chart-empty {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-muted);
  }

  .chart-empty-icon {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 56px;
    color: var(--border-strong);
  }

  .chart-empty-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  /* ==== Custom tooltip ==== */
  .custom-tooltip {
    background: var(--bg-elevated);
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    padding: 14px 16px;
    min-width: 240px;
    box-shadow: var(--shadow-elevated);
    backdrop-filter: blur(8px);
  }

  .tt-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border-subtle);
  }

  .tt-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    font-size: 12px;
  }

  .tt-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .tt-value {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-primary);
    font-weight: 500;
  }

  .tt-value.positive { color: var(--accent-green); }
  .tt-value.negative { color: var(--accent-red); }

  .tt-note {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border-subtle);
    font-size: 11px;
    color: var(--text-secondary);
    font-style: italic;
    line-height: 1.5;
    max-width: 240px;
    word-wrap: break-word;
  }

  /* ==== Session table panel ==== */
  .table-panel {
    background: var(--bg-panel);
    border: 1px solid var(--border-subtle);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: var(--shadow-elevated), var(--shadow-inset);
  }

  .table-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border-subtle);
  }

  .add-btn {
    background: linear-gradient(180deg, var(--accent-gold), #b8902f);
    color: #1a1410;
    border: none;
    padding: 9px 18px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 2px 0 #8d6c1f, var(--shadow-inset);
  }

  .add-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 3px 0 #8d6c1f, 0 4px 16px rgba(212, 168, 87, 0.3);
  }

  .add-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 #8d6c1f; }

  .table-scroll {
    overflow-x: auto;
    max-height: 480px;
    overflow-y: auto;
  }

  .session-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .session-table thead {
    position: sticky;
    top: 0;
    background: var(--bg-panel);
    z-index: 1;
  }

  .session-table th {
    text-align: left;
    padding: 12px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 500;
    border-bottom: 1px solid var(--border-subtle);
    background: var(--bg-elevated);
  }

  .session-table td {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border-subtle);
    vertical-align: middle;
  }

  .session-table tbody tr {
    transition: background 0.15s ease;
  }

  .session-table tbody tr:hover { background: var(--bg-elevated); }

  .td-date { font-family: 'JetBrains Mono', monospace; color: var(--text-secondary); white-space: nowrap; }
  .td-venue { color: var(--text-primary); font-weight: 500; }
  .td-stakes { font-family: 'JetBrains Mono', monospace; color: var(--accent-cyan); }
  .td-duration { font-family: 'JetBrains Mono', monospace; color: var(--text-secondary); }
  .td-money { font-family: 'JetBrains Mono', monospace; color: var(--text-secondary); text-align: right; }
  .td-pl { font-family: 'JetBrains Mono', monospace; font-weight: 600; text-align: right; }
  .td-pl.positive { color: var(--accent-green); }
  .td-pl.negative { color: var(--accent-red); }
  .td-note { color: var(--text-secondary); font-style: italic; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .td-actions {
    text-align: right;
    white-space: nowrap;
  }

  .icon-btn {
    background: transparent;
    border: 1px solid var(--border-subtle);
    color: var(--text-muted);
    width: 28px;
    height: 28px;
    border-radius: 4px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-left: 4px;
    transition: all 0.15s;
  }

  .icon-btn:hover { color: var(--accent-red); border-color: var(--accent-red); }

  .empty-row td {
    padding: 80px 20px;
    text-align: center;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* ==== Modal ==== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal {
    background: var(--bg-panel);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    width: 92%;
    max-width: 540px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 24px 64px rgba(0, 0, 0, 0.8), var(--shadow-inset);
    animation: slideUp 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 500;
  }

  .modal-close {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
    padding: 0 4px;
  }

  .modal-close:hover { color: var(--text-primary); }

  .modal-body {
    padding: 24px;
  }

  .form-grid {
    display: grid;
    gap: 18px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .form-field label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 7px;
  }

  .form-field input,
  .form-field textarea,
  .form-field select {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border-subtle);
    border-radius: 4px;
    padding: 10px 12px;
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .form-field input:focus,
  .form-field textarea:focus,
  .form-field select:focus {
    outline: none;
    border-color: var(--accent-gold);
    box-shadow: 0 0 0 3px rgba(212, 168, 87, 0.12);
  }

  .form-field textarea {
    resize: vertical;
    min-height: 70px;
    font-family: 'Inter', sans-serif;
  }

  .form-helper {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 5px;
  }

  .pnl-preview {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    background: var(--bg-input);
    border: 1px dashed var(--border-strong);
    border-radius: 4px;
  }

  .pnl-preview-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .pnl-preview-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 600;
    color: var(--text-secondary);
  }

  .pnl-preview-value.positive { color: var(--accent-green); }
  .pnl-preview-value.negative { color: var(--accent-red); }

  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border-subtle);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    background: var(--bg-elevated);
  }

  .btn {
    padding: 9px 18px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
  }

  .btn-secondary {
    background: transparent;
    border-color: var(--border-strong);
    color: var(--text-secondary);
  }

  .btn-secondary:hover { color: var(--text-primary); border-color: var(--text-secondary); }

  .btn-primary {
    background: linear-gradient(180deg, var(--accent-gold), #b8902f);
    color: #1a1410;
    box-shadow: 0 2px 0 #8d6c1f;
  }

  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 3px 0 #8d6c1f; }
  .btn-primary:active { transform: translateY(1px); box-shadow: 0 1px 0 #8d6c1f; }

  /* ==== Blog ==== */
  .blog-panel {
    background: var(--bg-panel);
    border: 1px solid var(--border-subtle);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: var(--shadow-elevated), var(--shadow-inset);
    margin-top: 24px;
  }

  .blog-grid {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: 520px;
  }

  .blog-list {
    border-right: 1px solid var(--border-subtle);
    background: var(--bg-deep);
    max-height: 720px;
    overflow-y: auto;
  }

  .blog-list-empty {
    padding: 60px 24px;
    text-align: center;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .blog-list-item {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border-subtle);
    cursor: pointer;
    position: relative;
    transition: background 0.15s ease;
  }

// 密码哈希值 (SHA-256). 默认密码: dengandongGT1227!

async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(x => x.toString(16).padStart(2, '0')).join('');
}

// ===== Utility =====
const fmtMoney = (v) => {
  const sign = v < 0 ? '-' : v > 0 ? '+' : '';
  const abs = Math.abs(v);
  return `${sign}$${abs.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 })}`;
};

const fmtMoneyPlain = (v) => {
  return `$${Math.abs(v).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 })}`;
};

const fmtDate = (iso) => {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: '2-digit' });
};

const fmtDateShort = (iso) => {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: '2-digit' });
};

const fmtDuration = (h) => {
  if (!h && h !== 0) return '—';
  const hours = Math.floor(h);
  const mins = Math.round((h - hours) * 60);
  if (mins === 0) return `${hours}h`;
  return `${hours}h ${mins}m`;
};

// ===== Storage =====
async function loadSessions() {
  try {
    const result = await window.storage.get(STORAGE_KEY);
    if (result && result.value) {
      return JSON.parse(result.value);
    }
  } catch (e) {
    // Key doesn't exist yet, return empty
  }
  return [];
}

async function saveSessions(sessions) {
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(sessions));
  } catch (e) {
    console.error('Failed to save:', e);
  }
}

async function loadPosts() {
  try {
    const result = await window.storage.get(POSTS_KEY);
    if (result && result.value) {
      return JSON.parse(result.value);
    }
  } catch (e) {
    // Key doesn't exist yet
  }
  return [];
}

async function savePosts(posts) {
  try {
    await window.storage.set(POSTS_KEY, JSON.stringify(posts));
  } catch (e) {
    console.error('Failed to save posts:', e);
  }
}

// Strip HTML tags for excerpt preview
function htmlToText(html) {
  const div = document.createElement('div');
  div.innerHTML = html || '';
  return (div.textContent || div.innerText || '').replace(/\s+/g, ' ').trim();
}

// ===== Demo seed (only first run) =====
const DEMO = [
  { id: '1', date: '2024-08-12', venue: 'Bellagio', stakes: '$2/$5 NL', duration: 6.5, buyIn: 500, cashOut: 1350, pnl: 850, note: '后期碰到一桌好桌，翻牌前控制紧凑' },

  { id: '5', date: '2024-11-02', venue: 'Resorts World', stakes: '$2/$5 NL', duration: 4, buyIn: 500, cashOut: 120, pnl: -380, note: '状态不好，及早离桌' },
  { id: '6', date: '2024-11-19', venue: 'Aria', stakes: '$5/$10 NL', duration: 9, buyIn: 1500, cashOut: 2950, pnl: 1450, note: '' },
  { id: '7', date: '2024-12-14', venue: 'Wynn', stakes: '$10/$25 NL', duration: 6, buyIn: 3000, cashOut: 6200, pnl: 3200, note: '尝试更高级别，对手偏松' },
  { id: '8', date: '2025-01-05', venue: 'Bellagio', stakes: '$5/$10 NL', duration: 8, buyIn: 2000, cashOut: 1150, pnl: -850, note: '河牌追了不该追的边' },
  { id: '9', date: '2025-02-20', venue: 'Aria', stakes: '$5/$10 NL', duration: 7, buyIn: 1500, cashOut: 3280, pnl: 1780, note: '' },
  { id: '10', date: '2025-03-15', venue: 'Bellagio', stakes: '$10/$25 NL', duration: 10, buyIn: 3000, cashOut: 7500, pnl: 4500, note: '生涯最佳一夜，捕捉到两个粘住AA的对手' },

const DEMO_POSTS = [
  {
    id: 'p1',
    date: '2025-03-16',
    title: '$10/$25 一手 AK vs 鱼的 4-bet 思考',
    body: '<p>昨晚 Bellagio 的牌桌，UTG 一个明显偏松的中年大叔开 $75，HJ 加到 $250，我在 BTN 拿 <strong>AKo</strong>。</p><p>这是经典的"4-bet or call"决策点。考虑到：</p><ul><li>UTG 是 fish，3-bet 范围会很重</li><li>HJ 是个 reg，但今天开局连续被打 down，状态可疑</li><li>我位置好，4-bet to $850 既能 fold equity，又能 isolate 鱼</li></ul><p>最终我 4-bet 了，HJ fold，UTG 跟。Flop K72 rainbow，我 c-bet $700 进 $2100 池，他直接 jam，我跟，他 KQ。</p><blockquote>反思：在 fish 跟注后，K-high flop 上对方 jam 的范围很窄，几乎都是 KQ/KJ/72/22/77，我跟得没问题。下次注意位置 + 对手类型的组合，能让 4-bet 更有理由。</blockquote>'

  {
    id: 'p2',

    title: '关于"何时该离桌"的一些感悟',

  },

// ===== Main App =====
function App() {
  const [sessions, setSessions] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [modalOpen, setModalOpen] = useState(false);
  const [editing, setEditing] = useState(null);
  const [chartMode, setChartMode] = useState('all'); // all | 30d | 90d | 1y

  // Blog state
  const [posts, setPosts] = useState([]);
  const [postsLoaded, setPostsLoaded] = useState(false);
  const [activePostId, setActivePostId] = useState(null);
  const [postModalOpen, setPostModalOpen] = useState(false);
  const [editingPost, setEditingPost] = useState(null);

  // Auth state - default to viewer mode
  const [isAuthor, setIsAuthor] = useState(false);
  const [unlockModalOpen, setUnlockModalOpen] = useState(false);

  // Restore unlock from sessionStorage on mount (per-tab session)
  useEffect(() => {
    try {
      if (sessionStorage.getItem(AUTH_SESSION_KEY) === '1') {
        setIsAuthor(true);
      }
    } catch (e) { /* ignore */ }
  }, []);

  const handleUnlock = useCallback(() => {
    setIsAuthor(true);
    try { sessionStorage.setItem(AUTH_SESSION_KEY, '1'); } catch (e) {}
    setUnlockModalOpen(false);
  }, []);

  const handleLock = useCallback(() => {
    setIsAuthor(false);
    try { sessionStorage.removeItem(AUTH_SESSION_KEY); } catch (e) {}
    // Close any edit modals just in case
    setModalOpen(false);
    setPostModalOpen(false);
    setEditing(null);
    setEditingPost(null);
  }, []);

  // Load sessions on mount
  useEffect(() => {
    (async () => {
      const stored = await loadSessions();
      if (stored.length === 0) {
        // First run: seed with demo
        setSessions(DEMO);
        await saveSessions(DEMO);
      } else {
        setSessions(stored);
      }
      setLoaded(true);
    })();
  }, []);

  // Persist sessions whenever they change (after initial load)
  useEffect(() => {
    if (loaded) saveSessions(sessions);
  }, [sessions, loaded]);

  // Load posts on mount
  useEffect(() => {
    (async () => {
      const stored = await loadPosts();
      if (stored.length === 0) {
        setPosts(DEMO_POSTS);
        await savePosts(DEMO_POSTS);
        setActivePostId(DEMO_POSTS[0]?.id || null);
      } else {
        setPosts(stored);
        setActivePostId(stored[0]?.id || null);
      }
      setPostsLoaded(true);
    })();
  }, []);

  // Persist posts
  useEffect(() => {
    if (postsLoaded) savePosts(posts);
  }, [posts, postsLoaded]);

  // Sorted ascending by date for chart, descending for table
  const sortedAsc = useMemo(() => {
    return [...sessions].sort((a, b) => new Date(a.date) - new Date(b.date));
  }, [sessions]);

  const sortedDesc = useMemo(() => {
    return [...sessions].sort((a, b) => new Date(b.date) - new Date(a.date));
  }, [sessions]);

  // Build cumulative chart data
  const chartData = useMemo(() => {
    let cum = 0;
    return sortedAsc.map((s) => {
      cum += s.pnl;
      return {
        ...s,
        cumulative: cum,
        ts: new Date(s.date).getTime(),
      };
    });
  }, [sortedAsc]);

  // Filter chart data by selected window
  const filteredChartData = useMemo(() => {
    if (chartMode === 'all' || chartData.length === 0) return chartData;
    const now = Date.now();
    const days = { '30d': 30, '90d': 90, '1y': 365 }[chartMode];
    const cutoff = now - days * 24 * 60 * 60 * 1000;
    return chartData.filter((d) => d.ts >= cutoff);
  }, [chartData, chartMode]);

  // Stats
  const stats = useMemo(() => {
    const total = sortedAsc.reduce((sum, s) => sum + s.pnl, 0);
    const sessions_count = sortedAsc.length;
    const winning = sortedAsc.filter(s => s.pnl > 0).length;
    const winRate = sessions_count > 0 ? (winning / sessions_count) * 100 : 0;
    const totalHours = sortedAsc.reduce((sum, s) => sum + (Number(s.duration) || 0), 0);
    const hourlyRate = totalHours > 0 ? total / totalHours : 0;
    const biggestWin = sortedAsc.length > 0 ? Math.max(...sortedAsc.map(s => s.pnl)) : 0;
    const biggestLoss = sortedAsc.length > 0 ? Math.min(...sortedAsc.map(s => s.pnl)) : 0;
    return { total, sessions_count, winRate, hourlyRate, totalHours, biggestWin, biggestLoss };
  }, [sortedAsc]);

  const handleSubmit = useCallback((data) => {
    if (data.id && sessions.find(s => s.id === data.id)) {
      setSessions(prev => prev.map(s => s.id === data.id ? data : s));
    } else {
      setSessions(prev => [...prev, { ...data, id: Date.now().toString() }]);
    }
    setModalOpen(false);
    setEditing(null);
  }, [sessions]);

  const handleDelete = useCallback((id) => {
    if (confirm('Are you sure you want to delete this session?')) {
      setSessions(prev => prev.filter(s => s.id !== id));
    }
  }, []);

  const handleEdit = (s) => {
    setEditing(s);
    setModalOpen(true);
  };

  const handleAdd = () => {
    setEditing(null);
    setModalOpen(true);
  };

  // ===== Blog handlers =====
  const sortedPosts = useMemo(() => {
    return [...posts].sort((a, b) => new Date(b.date) - new Date(a.date));
  }, [posts]);

  const activePost = useMemo(
    () => sortedPosts.find(p => p.id === activePostId) || sortedPosts[0] || null,
    [sortedPosts, activePostId]
  );

  const handlePostSubmit = useCallback((data) => {
    if (data.id && posts.find(p => p.id === data.id)) {
      setPosts(prev => prev.map(p => p.id === data.id ? data : p));
      setActivePostId(data.id);
    } else {
      const newId = 'p' + Date.now().toString();
      setPosts(prev => [...prev, { ...data, id: newId }]);
      setActivePostId(newId);
    }
    setPostModalOpen(false);
    setEditingPost(null);
  }, [posts]);

  const handlePostDelete = useCallback((id) => {
    if (confirm('确定要删除这篇文章吗？')) {
      setPosts(prev => prev.filter(p => p.id !== id));
      setActivePostId(null);
    }
  }, []);

  const handlePostEdit = (p) => {
    setEditingPost(p);
    setPostModalOpen(true);
  };

  const handlePostAdd = () => {
    setEditingPost(null);
    setPostModalOpen(true);
  };

  return (
    <>
      <Header
        sessionCount={sortedAsc.length}
        isAuthor={isAuthor}
        onUnlockClick={() => setUnlockModalOpen(true)}
        onLockClick={handleLock}
      />
      <main className="main">
        <StatsStrip stats={stats} />
        <ChartPanel
          data={filteredChartData}
          mode={chartMode}
          setMode={setChartMode}
          totalPoints={chartData.length}
        />
        <TablePanel
          sessions={sortedDesc}
          isAuthor={isAuthor}
          onAdd={handleAdd}
          onEdit={handleEdit}
          onDelete={handleDelete}
        />
        <BlogPanel
          posts={sortedPosts}
          activePost={activePost}
          isAuthor={isAuthor}
          onSelect={setActivePostId}
          onAdd={handlePostAdd}
          onEdit={handlePostEdit}
          onDelete={handlePostDelete}
        />
      </main>
      <footer className="footer">
        <span className="footer-mark">BlackTeaLemon</span> · TRACK · ANALYZE · IMPROVE
      </footer>
      {modalOpen && isAuthor && (
        <SessionModal
          initial={editing}
          onSubmit={handleSubmit}
          onClose={() => { setModalOpen(false); setEditing(null); }}
        />
      )}
      {postModalOpen && isAuthor && (
        <PostModal
          initial={editingPost}
          onSubmit={handlePostSubmit}
          onClose={() => { setPostModalOpen(false); setEditingPost(null); }}
        />
      )}
      {unlockModalOpen && (
        <UnlockModal
          onUnlock={handleUnlock}
          onClose={() => setUnlockModalOpen(false)}
        />
      )}
    </>
  );
}

// ===== Rich Text Editor =====
function RichEditor({ initialHtml, onChange }) {
  const ref = React.useRef(null);

  useEffect(() => {
    if (ref.current && ref.current.innerHTML !== (initialHtml || '')) {
      ref.current.innerHTML = initialHtml || '';
    }
  }, []);

  const exec = (cmd, value = null) => {
    document.execCommand(cmd, false, value);
    if (ref.current) {
      ref.current.focus();
      onChange(ref.current.innerHTML);
    }
  };

  const handleInput = () => {
    if (ref.current) onChange(ref.current.innerHTML);
  };

  const Btn = ({ cmd, value, children, title, className = '' }) => (
    <button
      type="button"
      className={`editor-tool-btn ${className}`}
      title={title}
      onMouseDown={(e) => { e.preventDefault(); exec(cmd, value); }}
    >
      {children}
    </button>
  );

  return (
    <>
      <div className="editor-toolbar">
        <Btn cmd="formatBlock" value="h1" title="Heading 1">H1</Btn>
        <Btn cmd="formatBlock" value="h2" title="Heading 2">H2</Btn>
        <Btn cmd="formatBlock" value="h3" title="Heading 3">H3</Btn>
        <Btn cmd="formatBlock" value="p"  title="Paragraph">P</Btn>
        <span className="editor-divider"></span>
        <Btn cmd="bold"      title="Bold (Ctrl+B)"      className="bold-btn">B</Btn>
        <Btn cmd="italic"    title="Italic (Ctrl+I)"    className="italic-btn">I</Btn>
        <Btn cmd="underline" title="Underline (Ctrl+U)" className="underline-btn">U</Btn>
        <span className="editor-divider"></span>
        <Btn cmd="insertUnorderedList" title="Bullet list">•</Btn>
        <Btn cmd="insertOrderedList"   title="Numbered list">1.</Btn>
        <Btn cmd="formatBlock" value="blockquote" title="Quote">&ldquo;</Btn>
        <span className="editor-divider"></span>
        <Btn cmd="removeFormat" title="Clear formatting">⌫</Btn>
      </div>
      <div
        ref={ref}
        className="editor-content"
        contentEditable
        suppressContentEditableWarning
        onInput={handleInput}
        data-placeholder="Start writing your hand analysis or thoughts…"
      />
    </>
  );
}

// ===== Unlock Modal =====
function UnlockModal({ onUnlock, onClose }) {
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [checking, setChecking] = useState(false);
  const inputRef = React.useRef(null);

  // Lock body scroll
  useEffect(() => {
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = ''; };
  }, []);

  // Auto-focus input
  useEffect(() => {
    if (inputRef.current) inputRef.current.focus();
  }, []);

  // ESC closes
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);

  const submit = async () => {
    if (!password) {
      setError('Please enter the password');
      return;
    }
    setChecking(true);
    setError('');
    try {
      const hash = await sha256(password);
      if (hash === AUTHOR_HASH) {
        onUnlock();
      } else {
        setError('Incorrect password');
        setPassword('');
        if (inputRef.current) inputRef.current.focus();
      }
    } catch (e) {
      setError('Verification error');
    } finally {
      setChecking(false);
    }
  };

  const onKeyDown = (e) => {
    if (e.key === 'Enter' && !checking) submit();
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal unlock-modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-header">
          <span className="modal-title">Author Access</span>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <div className="unlock-icon-wrap">
            <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
          <div className="unlock-tagline">Enter password to unlock editing</div>
          <div className="form-field">
            <label>Password</label>
            <input
              ref={inputRef}
              type="password"
              placeholder="••••••••••"
              value={password}
              onChange={(e) => setPassword(e.target.value)}
              onKeyDown={onKeyDown}
              autoComplete="off"
            />
            {error && <div className="unlock-error">{error}</div>}
          </div>
          <div className="unlock-helper">
            Viewers can browse all sessions and posts.<br/>
            Only the author can add, edit, or delete records.
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={submit} disabled={checking}>
            {checking ? 'Verifying…' : 'Unlock'}
          </button>
        </div>
      </div>
    </div>
  );
}

        <div className="modal-header">
          <span className="modal-title">{initial ? 'Edit Post' : 'New Post'}</span>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <div className="form-grid">
            <div className="form-row">
              <div className="form-field">
                <label>Date</label>
                <input type="date" value={form.date} onChange={(e) => update('date', e.target.value)} />
              </div>
              <div className="form-field">
                <label>Title</label>
                <input
                  type="text"
                  placeholder="Give this post a title"
                  value={form.title}
                  onChange={(e) => update('title', e.target.value)}
                />
              </div>
            </div>
            <div className="form-field">
              <label>Content</label>
              <RichEditor
                initialHtml={form.body}
                onChange={(html) => update('body', html)}
              />
            </div>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={submit}>{initial ? 'Save Changes' : 'Publish'}</button>
        </div>
      </div>
    </div>
  );
}

// ===== Session Modal =====
function SessionModal({ initial, onSubmit, onClose }) {
  const today = new Date().toISOString().slice(0, 10);
  const [form, setForm] = useState(initial || {
    date: today,
    venue: '',
    stakes: '',
    duration: '',
    buyIn: '',
    cashOut: '',
    note: '',
  });

  // Lock body scroll
  useEffect(() => {
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = ''; };
  }, []);

  // ESC closes
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);

  const update = (k, v) => setForm(f => ({ ...f, [k]: v }));

  // 实时计算 P/L 预览
  const pnlPreview = useMemo(() => {
    const bi = Number(form.buyIn);
    const co = Number(form.cashOut);
    if (form.buyIn === '' || form.cashOut === '' || isNaN(bi) || isNaN(co)) return null;
    return co - bi;
  }, [form.buyIn, form.cashOut]);

  const submit = () => {
    if (!form.date || !form.venue.trim() || !form.stakes.trim() || form.buyIn === '' || form.cashOut === '') {
      alert('Please fill in all required fields: Date, Venue, Stakes, Buy-in, and Cash-out.');
      return;
    }
    const buyIn = Number(form.buyIn);
    const cashOut = Number(form.cashOut);
    if (isNaN(buyIn) || isNaN(cashOut) || buyIn < 0 || cashOut < 0) {
      alert('Buy-in 和 Cash-out 必须是非负数字。');
      return;
    }
    onSubmit({
      ...form,
      id: form.id,
      venue: form.venue.trim(),
      stakes: form.stakes.trim(),
      buyIn: buyIn,
      cashOut: cashOut,
      pnl: cashOut - buyIn,
      duration: form.duration === '' ? 0 : Number(form.duration),
      note: (form.note || '').trim(),
    });
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-header">
          <span className="modal-title">{initial ? 'Edit Session' : 'New Session'}</span>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <div className="form-grid">
            <div className="form-row">
              <div className="form-field">
                <label>Date</label>
                <input type="date" value={form.date} onChange={(e) => update('date', e.target.value)} />
              </div>
              <div className="form-field">
                <label>Duration (Hours)</label>
                <input
                  type="number"
                  step="0.5"
                  min="0"
                  placeholder="e.g. 6.5"
                  value={form.duration}
                  onChange={(e) => update('duration', e.target.value)}
                />
              </div>
            </div>
            <div className="form-field">
              <label>Venue / Casino</label>
              <input
                type="text"
                placeholder="e.g. Bellagio, Wynn, Local Cardroom"
                value={form.venue}
                onChange={(e) => update('venue', e.target.value)}
              />
            </div>
            <div className="form-field">
              <label>Stakes / Blinds</label>
              <input
                type="text"
                placeholder="e.g. $2/$5 NL, $5/$10 PLO"
                value={form.stakes}
                onChange={(e) => update('stakes', e.target.value)}
              />
            </div>
            <div className="form-row">
              <div className="form-field">
                <label>Buy-in ($)</label>
                <input
                  type="number"
                  step="1"
                  min="0"
                  placeholder="e.g. 500"
                  value={form.buyIn}
                  onChange={(e) => update('buyIn', e.target.value)}
                />
              </div>
              <div className="form-field">
                <label>Cash-out ($)</label>
                <input
                  type="number"
                  step="1"
                  min="0"
                  placeholder="e.g. 1350"
                  value={form.cashOut}
                  onChange={(e) => update('cashOut', e.target.value)}
                />
              </div>
            </div>
            <div className="pnl-preview">
              <span className="pnl-preview-label">Profit / Loss</span>
              <span className={`pnl-preview-value ${pnlPreview === null ? '' : pnlPreview > 0 ? 'positive' : pnlPreview < 0 ? 'negative' : ''}`}>
                {pnlPreview === null ? '—' : fmtMoney(pnlPreview)}
              </span>
            </div>
            <div className="form-field">
              <label>Notes</label>
              <textarea
                placeholder="Thoughts, memorable hands, bad beats, coolers, or anything you want to remember about this session..."
                value={form.note}
                onChange={(e) => update('note', e.target.value)}
              ></textarea>
            </div>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={submit}>{initial ? 'Save Changes' : 'Add Session'}</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
